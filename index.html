<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="LeafLock wholesale pharmacy CRM - track 646+ Australian stores, pipeline deals, and revenue forecasts.">
  <meta name="theme-color" content="#1f5f39">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LeafLock Sales">
  <title>LeafLock Sales — Pipeline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="app-shell">
    <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <aside id="sidebar" class="sidebar" aria-label="Main navigation">
      <div class="sidebar-top">
        <a class="brand" href="./" aria-label="LeafLock Pharmacy Pipeline home">
          <img class="brand-icon" src="icons/icon-192.png" width="40" height="40" alt="">
          <div>
            LeafLock Sales
            <small>646 pharmacy pipeline</small>
          </div>
        </a>
        <button id="sidebar-close" class="icon-btn sidebar-close" type="button" aria-label="Close menu">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <nav class="nav" aria-label="Views">
        <button type="button" class="active" data-view="pipeline"><span class="nav-icon pd-icon" aria-hidden="true">▦</span> Deals</button>
        <button type="button" data-view="stores"><span class="nav-icon pd-icon" aria-hidden="true">◎</span> Organizations</button>
        <button type="button" data-view="contacts"><span class="nav-icon pd-icon" aria-hidden="true">◉</span> People</button>
        <button type="button" data-view="tasks"><span class="nav-icon pd-icon" aria-hidden="true">☑</span> Activities<span id="nav-task-badge" class="nav-badge" hidden>0</span></button>
        <button type="button" data-view="settings"><span class="nav-icon pd-icon" aria-hidden="true">⚙</span> Settings</button>
      </nav>

      <div class="sidebar-stats" aria-live="polite">
        <div>Total stores<strong id="stat-total">0</strong></div>
        <div class="stat-row"><span>Open deals</span><strong id="stat-open">0</strong></div>
        <div class="stat-row"><span>Won</span><strong id="stat-won">0</strong></div>
        <div class="stat-row"><span id="stat-pipeline-label">Pipeline</span><strong id="stat-value">$0</strong></div>
      </div>
    </aside>

    <div class="main">
      <header class="site-header">
        <div class="header-row">
          <button id="menu-toggle" class="icon-btn menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <div class="header-titles">
            <p class="eyebrow">LeafLock Sales CRM</p>
            <h1 id="page-title">Deals</h1>
          </div>
          <span id="sync-status" class="sync-status" title="Team sync status">Local only</span>
          <button id="btn-install" class="btn btn-ghost btn-small install-btn" type="button" hidden>Install app</button>
        </div>

        <div class="header-tools">
          <label class="search-box" id="search-box-wrap">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="search-input" type="search" placeholder="Search all chemists — e.g. Chempro, Priceline…" autocomplete="off" enterkeyhint="search" aria-expanded="false" aria-controls="search-results">
            <div id="search-results" class="search-results" hidden role="listbox" aria-label="Store search results"></div>
          </label>
          <div class="toolbar">
            <button id="btn-clear-filters" class="btn btn-ghost btn-small" type="button">Clear</button>
            <button id="btn-add" class="btn btn-primary" type="button">+ Deal</button>
          </div>
        </div>

        <div class="chip-filters" role="group" aria-label="Filters">
          <select id="filter-state" class="filter-chip" aria-label="Filter by state"></select>
          <select id="filter-type" class="filter-chip" aria-label="Filter by type"></select>
          <select id="filter-relevance" class="filter-chip" aria-label="Filter by priority">
            <option value="">All priority</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
          <select id="filter-stage" class="filter-chip" aria-label="Filter by stage"></select>
          <select id="filter-status" class="filter-chip" aria-label="Filter by status"></select>
          <select id="filter-assignee" class="filter-chip" aria-label="Filter by assignee"></select>
        </div>
      </header>

      <main id="main-content" class="content">
        <section id="revenue-hero" class="revenue-hero" aria-label="Revenue forecast"></section>
        <section id="metrics" class="metrics" aria-label="Key metrics"></section>

        <section id="view-pipeline" class="view active" aria-label="Pipeline board">
          <div id="team-workload" class="team-workload-host" aria-label="Team workload"></div>
          <div id="pipeline-toolbar" class="pipeline-toolbar"></div>
          <div id="pipeline-board" class="pipeline-board"></div>
          <div id="pipeline-list" class="pipeline-list" hidden></div>
        </section>

        <section id="view-stores" class="view" aria-label="Store directory">
          <div id="stores-grid" class="card-grid"></div>
        </section>

        <section id="view-contacts" class="view" aria-label="Contacts">
          <div id="contacts-grid" class="card-grid"></div>
        </section>

        <section id="view-tasks" class="view" aria-label="Team tasks">
          <div id="tasks-toolbar" class="tasks-toolbar"></div>
          <div id="tasks-grid" class="card-grid"></div>
        </section>

        <section id="view-settings" class="view" aria-label="Settings">
          <div id="settings-content"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <header class="drawer-header">
      <div class="drawer-header-main">
        <h2 id="drawer-title">Deal</h2>
        <p id="drawer-sub" class="drawer-sub"></p>
      </div>
      <button id="drawer-close" class="icon-btn" type="button" aria-label="Close panel">×</button>
    </header>
    <div id="drawer-deal-banner" class="drawer-deal-banner" hidden></div>
    <nav id="drawer-tabs" class="drawer-tabs" hidden aria-label="Deal sections"></nav>
    <div id="drawer-body" class="drawer-body"></div>
  </aside>

  <div id="task-alert-backdrop" class="task-alert-backdrop" hidden aria-hidden="true"></div>
  <div id="task-alert" class="task-alert" role="alertdialog" aria-labelledby="task-alert-title" hidden>
    <div class="task-alert-inner">
      <p class="task-alert-eyebrow" id="task-alert-eyebrow">New task for you</p>
      <h2 id="task-alert-title">Follow up</h2>
      <p id="task-alert-meta" class="task-alert-meta"></p>
      <div class="task-alert-actions">
        <button type="button" class="btn btn-primary" id="task-alert-view">View my tasks</button>
        <button type="button" class="btn btn-ghost" id="task-alert-dismiss">Got it</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="config.js" defer></script>
  <script src="seed.js" defer></script>
  <script src="sync.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
