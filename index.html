<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="LeafLock wholesale pharmacy CRM - track 646+ Australian stores, pipeline deals, and revenue forecasts.">
  <meta name="theme-color" content="#1f5f39">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LeafLock Sales">
  <title>LeafLock Pharmacy Pipeline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="app-shell">
    <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <aside id="sidebar" class="sidebar" aria-label="Main navigation">
      <div class="sidebar-top">
        <a class="brand" href="./" aria-label="LeafLock Pharmacy Pipeline home">
          <img class="brand-icon" src="icons/icon-192.png" width="40" height="40" alt="">
          <div>
            LeafLock Sales
            <small>646 pharmacy pipeline</small>
          </div>
        </a>
        <button id="sidebar-close" class="icon-btn sidebar-close" type="button" aria-label="Close menu">X</button>
      </div>

      <nav class="nav" aria-label="Views">
        <button type="button" class="active" data-view="pipeline"><span class="nav-icon" aria-hidden="true">#</span> Pipeline</button>
        <button type="button" data-view="stores"><span class="nav-icon" aria-hidden="true">O</span> Stores</button>
        <button type="button" data-view="contacts"><span class="nav-icon" aria-hidden="true">@</span> Contacts</button>
        <button type="button" data-view="tasks"><span class="nav-icon" aria-hidden="true">+</span> Tasks</button>
        <button type="button" data-view="settings"><span class="nav-icon" aria-hidden="true">*</span> Settings</button>
      </nav>

      <div class="sidebar-stats" aria-live="polite">
        <div>Total stores<strong id="stat-total">0</strong></div>
        <div class="stat-row"><span>Open deals</span><strong id="stat-open">0</strong></div>
        <div class="stat-row"><span>Won</span><strong id="stat-won">0</strong></div>
        <div class="stat-row"><span>Pipeline</span><strong id="stat-value">$0</strong></div>
      </div>
    </aside>

    <div class="main">
      <header class="site-header">
        <div class="header-row">
          <button id="menu-toggle" class="icon-btn menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">=</button>
          <div class="header-titles">
            <p class="eyebrow">LeafLock wholesale CRM</p>
            <h1 id="page-title">Sales Pipeline</h1>
          </div>
          <span id="sync-status" class="sync-status" title="Team sync status">Local only</span>
          <button id="btn-install" class="btn btn-ghost btn-small install-btn" type="button" hidden>Install app</button>
        </div>

        <div class="header-tools">
          <label class="search-box">
            <span aria-hidden="true">?</span>
            <input id="search-input" type="search" placeholder="Search stores, emails, suburbs..." autocomplete="off" enterkeyhint="search">
          </label>
          <div class="toolbar">
            <button id="btn-clear-filters" class="btn btn-ghost btn-small" type="button">Clear</button>
            <button id="btn-add" class="btn btn-primary" type="button">+ Add store</button>
          </div>
        </div>

        <div class="chip-filters" role="group" aria-label="Filters">
          <select id="filter-state" class="filter-chip" aria-label="Filter by state"></select>
          <select id="filter-type" class="filter-chip" aria-label="Filter by type"></select>
          <select id="filter-relevance" class="filter-chip" aria-label="Filter by priority">
            <option value="">All priority</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
          <select id="filter-stage" class="filter-chip" aria-label="Filter by stage"></select>
          <select id="filter-status" class="filter-chip" aria-label="Filter by status"></select>
          <select id="filter-assignee" class="filter-chip" aria-label="Filter by assignee"></select>
        </div>
      </header>

      <main id="main-content" class="content">
        <section id="revenue-hero" class="revenue-hero" aria-label="Revenue forecast"></section>
        <section id="metrics" class="metrics" aria-label="Key metrics"></section>

        <section id="view-pipeline" class="view active" aria-label="Pipeline board">
          <div id="pipeline-board" class="pipeline-board"></div>
        </section>

        <section id="view-stores" class="view" aria-label="Store directory">
          <div id="stores-grid" class="card-grid"></div>
        </section>

        <section id="view-contacts" class="view" aria-label="Contacts">
          <div id="contacts-grid" class="card-grid"></div>
        </section>

        <section id="view-tasks" class="view" aria-label="Team tasks">
          <div id="tasks-toolbar" class="tasks-toolbar"></div>
          <div id="tasks-grid" class="card-grid"></div>
        </section>

        <section id="view-settings" class="view" aria-label="Settings">
          <div id="settings-content"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <header class="drawer-header">
      <div>
        <h2 id="drawer-title">Store</h2>
        <p id="drawer-sub" class="drawer-sub"></p>
      </div>
      <button id="drawer-close" class="icon-btn" type="button" aria-label="Close panel">X</button>
    </header>
    <div id="drawer-body" class="drawer-body"></div>
  </aside>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="config.js" defer></script>
  <script src="seed.js" defer></script>
  <script src="sync.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
